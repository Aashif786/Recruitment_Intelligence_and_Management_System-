user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting pools
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    upstream frontend {
        server frontend_blue:3000;
    }

    upstream backend {
        server backend_blue:10000;
    }

    server {
        listen 443 ssl http2;
        server_name caldimproducts.com;
        ssl_certificate     /etc/letsencrypt/live/caldimproducts.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/caldimproducts.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        
        # Global Redirects to /calrims namespace
        location = /support { return 301 /calrims/support; }
        location = /terms { return 301 /calrims/terms; }
        location = /privacy { return 301 /calrims/privacy; }
        location = /offer { return 301 /calrims/offer; }
        location = /company { return 301 /calrims/company; }

        # Frontend Routes
        location /calrims {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API Routes (Handles both /api/ and the double /api/api/ error)
        # Specific exemption for frontend-hosted API routes (Priority match)
        location ^~ /calrims/api/generate-pdf {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /calrims/api/health {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /calrims/api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/calrims/api/api/(.*) /api/$1 break;
            rewrite ^/calrims/api/(.*) /api/$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket Routes
        location /calrims/ws/ {
            rewrite ^/calrims/ws/(.*) /ws/$1 break;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }

    server {
        listen 80;
        server_name caldimproducts.com;
        return 301 https://$host$request_uri;
    }
}
